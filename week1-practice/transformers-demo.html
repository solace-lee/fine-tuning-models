<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DistilBERT 文本分类 - Week1</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>DistilBERT 文本分类</h1>
      <p>使用 Transformers.js 加载预训练模型进行情感分析</p>
      <a href="/" style="color: var(--accent); margin-top: 0.5rem; display: inline-block;">← 返回首页</a>
    </header>

    <div class="grid">
      <div class="card">
        <h2>模型信息</h2>
        <div id="model-info">
          <p>模型: distilbert-base-uncased-finetuned-sst-2-english</p>
          <p>参数量: ~66M</p>
          <p>任务: 情感分析 (正面/负面)</p>
        </div>
        <button id="load-model" class="btn btn-primary">加载模型</button>
        <div id="load-status" style="margin-top: 0.5rem;"></div>
      </div>

      <div class="card">
        <h2>显存监控</h2>
        <div id="memory-monitor"></div>
      </div>
    </div>

    <div class="card">
      <h2>情感分析</h2>
      <div class="input-group">
        <label>输入英文文本</label>
        <textarea id="input-text" placeholder="Enter text to analyze...">I absolutely love this product! It works perfectly and exceeded my expectations.</textarea>
      </div>
      <button id="analyze-btn" class="btn btn-success" disabled>分析情感</button>
      <div id="analysis-result" class="result-box" style="display: none;"></div>
    </div>

    <div class="card">
      <h2>预设测试用例</h2>
      <div class="nav-links">
        <button class="btn btn-warning test-case" data-text="This is the best day of my life!">正面示例</button>
        <button class="btn btn-warning test-case" data-text="I hate this terrible experience.">负面示例</button>
        <button class="btn btn-warning test-case" data-text="The weather is okay today.">中性示例</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/transformers-demo.js"></script>
</body>
</html>
