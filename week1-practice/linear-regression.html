<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>线性回归 Hello World - Week1</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>线性回归 Hello World</h1>
      <p>TensorFlow.js 入门：训练模型预测 y = 2x - 1</p>
      <a href="/" style="color: var(--accent); margin-top: 0.5rem; display: inline-block;">← 返回首页</a>
    </header>

    <div class="grid">
      <div class="card">
        <h2>训练配置</h2>
        <div class="input-group">
          <label>训练轮数 (Epochs)</label>
          <input type="number" id="epochs" value="250" min="10" max="1000">
        </div>
        <div class="input-group">
          <label>学习率</label>
          <input type="number" id="learning-rate" value="0.1" step="0.01" min="0.001" max="1">
        </div>
        <button id="train-btn" class="btn btn-primary">开始训练</button>
      </div>

      <div class="card">
        <h2>显存监控</h2>
        <div id="memory-monitor"></div>
      </div>
    </div>

    <div class="card">
      <h2>训练过程</h2>
      <div class="progress-bar">
        <div id="progress-fill" class="progress-bar-fill" style="width: 0%"></div>
      </div>
      <p id="training-status">等待开始...</p>
    </div>

    <div class="card">
      <h2>损失曲线</h2>
      <canvas id="loss-chart" width="800" height="300"></canvas>
    </div>

    <div class="card">
      <h2>预测测试</h2>
      <div class="input-group">
        <label>输入 x 值</label>
        <input type="number" id="predict-input" value="10" placeholder="输入任意数字">
      </div>
      <button id="predict-btn" class="btn btn-success" disabled>预测</button>
      <div id="predict-result" class="result-box" style="display: none;"></div>
    </div>
  </div>

  <script type="module" src="/src/linear-regression.js"></script>
</body>
</html>
